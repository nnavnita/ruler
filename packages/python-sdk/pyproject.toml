[project]
name = "ruler-python-sdk"
version = "0.2.1"
description = "Framework-agnostic Python rule engine + SDK. Wraps GoRules Zen; pluggable version store, audit sink, and test store."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Ruler" }]
dependencies = [
    "zen-engine>=0.35.0",
    "pydantic>=2.6",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.5"]

[dependency-groups]
dev = ["pytest>=8.0", "ruff>=0.5"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ruler"]

[tool.hatch.build.targets.sdist]
include = ["src", "README.md"]
