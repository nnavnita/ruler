[project]
name = "ruler-engine"
version = "0.1.0"
description = "Framework-agnostic rule engine wrapping GoRules Zen. Pluggable storage + audit."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Ruler" }]
dependencies = [
    "zen-engine>=0.35.0",
    "pydantic>=2.6",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.5"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ruler_engine"]

[tool.hatch.build.targets.sdist]
include = ["src", "README.md"]
