<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ruler — visual rule-engine studio</title>
    <meta
      name="description"
      content="Ruler is a visual rule-engine studio. WYSIWYG JDM decision-graph editor, live trace overlay, and audit history. Python engine for embedding, React library for building. GoRules Zen under the hood."
    />
    <link rel="icon" type="image/svg+xml" href="/ruler/favicon.svg" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ruler — visual rule-engine studio" />
    <meta property="og:description" content="WYSIWYG JDM editor + trace overlay + audit history. Python engine, React library. GoRules Zen under the hood." />
    <meta property="og:url" content="https://nnavnita.github.io/ruler/" />
    <meta name="twitter:card" content="summary" />

    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <!-- Apply saved theme before hydration so we don't flash the wrong one. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("ruler.theme.v1");
          var choice = raw === "light" || raw === "dark" ? raw : "system";
          var effective =
            choice === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : choice;
          var el = document.documentElement;
          el.dataset.theme = effective;
          if (effective === "dark") el.classList.add("dark");
          el.style.colorScheme = effective;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
